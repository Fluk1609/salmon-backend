name: Go CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install deps
        run: go mod tidy

      - name: Build
        run: go build ./cmd/api

      - name: Test
        run: go test ./...